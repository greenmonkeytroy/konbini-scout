<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-label="Happy lucky cat">
  <!-- Body -->
  <ellipse cx="32" cy="42" rx="14" ry="16" fill="#FAF6F0" stroke="#2D2A26" stroke-width="2"/>
  <!-- Head -->
  <circle cx="32" cy="22" r="13" fill="#FAF6F0" stroke="#2D2A26" stroke-width="2"/>
  <!-- Left ear -->
  <path d="M19 14 L14 6 L22 11 Z" fill="#FAF6F0" stroke="#2D2A26" stroke-width="2" stroke-linejoin="round"/>
  <!-- Right ear -->
  <path d="M45 14 L50 6 L42 11 Z" fill="#FAF6F0" stroke="#2D2A26" stroke-width="2" stroke-linejoin="round"/>
  <!-- Inner ear left -->
  <path d="M19 13 L15 7 L21 11 Z" fill="#D94F4F" opacity="0.5"/>
  <!-- Inner ear right -->
  <path d="M45 13 L49 7 L43 11 Z" fill="#D94F4F" opacity="0.5"/>
  <!-- Eyes (happy curved) -->
  <path d="M25 21 Q27 18 29 21" stroke="#2D2A26" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M35 21 Q37 18 39 21" stroke="#2D2A26" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Nose -->
  <ellipse cx="32" cy="24" rx="2" ry="1.5" fill="#D94F4F"/>
  <!-- Mouth (smile) -->
  <path d="M29 26 Q32 29 35 26" stroke="#2D2A26" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Cheeks -->
  <circle cx="24" cy="25" r="3" fill="#D94F4F" opacity="0.25"/>
  <circle cx="40" cy="25" r="3" fill="#D94F4F" opacity="0.25"/>
  <!-- Whiskers left -->
  <line x1="22" y1="24" x2="16" y2="22" stroke="#2D2A26" stroke-width="1" stroke-linecap="round"/>
  <line x1="22" y1="25" x2="16" y2="25" stroke="#2D2A26" stroke-width="1" stroke-linecap="round"/>
  <!-- Whiskers right -->
  <line x1="42" y1="24" x2="48" y2="22" stroke="#2D2A26" stroke-width="1" stroke-linecap="round"/>
  <line x1="42" y1="25" x2="48" y2="25" stroke="#2D2A26" stroke-width="1" stroke-linecap="round"/>
  <!-- Raised left arm (waving) -->
  <path d="M18 35 Q10 28 12 20 Q14 15 19 17 Q20 22 18 28 Q18 31 20 34" fill="#FAF6F0" stroke="#2D2A26" stroke-width="2" stroke-linejoin="round"/>
  <!-- Right arm down -->
  <path d="M46 35 Q52 38 50 44" stroke="#2D2A26" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Coin/bell -->
  <circle cx="34" cy="56" r="3" fill="#F2C94C" stroke="#2D2A26" stroke-width="1.5"/>
  <!-- Collar -->
  <path d="M20 33 Q32 37 44 33" stroke="#D94F4F" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Tail -->
  <path d="M18 54 Q10 50 12 42" stroke="#2D2A26" stroke-width="2" stroke-linecap="round" fill="none"/>
</svg>
